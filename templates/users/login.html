<!-- ========================
  users/login.html
======================== -->
{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-sub">Sign in to continue shopping </p>
        </div>
        <div class="auth-body">
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button class="btn btn-primary btn-block auth-submit mt-3" type="submit">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>
        </div>
        <div class="auth-footer">
            <span>New to Paw Sphere?</span>
            <a href="{% url 'register' %}">Create an account</a>
        </div>
    </div>
    <div class="auth-side d-none d-lg-flex">
        <img src="https://imgs.search.brave.com/nchTMWakbMaKB8uY4FL2WCMObsp4hvSyAfOsrGnr1_g/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMTM0/NDAyMTg4Mi9waG90/by9wb3J0cmFpdC1v/Zi1oYXBweS1tdWx0/aXJhY2lhbC1jb3Vw/bGUtc2NyYXRjaGlu/Zy10aGVpci1wZXQt/ZG9nLXNpdHRpbmct/b24tZmxvb3ItYXQt/aG9tZS53ZWJwP2E9/MSZiPTEmcz02MTJ4/NjEyJnc9MCZrPTIw/JmM9T0NkbWc2dWty/bGQ0VnBuSmZCamlq/U0dPZmhDSWhpLWRF/c3RxVzBmbVJwND0" alt="Paw Sphere" class="auth-side-img">
        <div class="auth-side-overlay">
        </div>
    </div>
</div>

<style>
.auth-page { display:flex; min-height:70vh; border-radius:20px; overflow:hidden; border:1px solid var(--border); box-shadow:var(--shadow-lg); }
.auth-card { background:white; flex:0 0 420px; display:flex; flex-direction:column; padding:3rem; }
.auth-header { text-align:center; margin-bottom:2rem; }
.auth-logo { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; color:var(--sage); letter-spacing:0.1em; margin-bottom:0.75rem; }
.auth-title { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:400; margin-bottom:6px; }
.auth-sub { font-size:0.88rem; color:var(--gray-600); }
.auth-body { flex:1; }
.auth-submit { padding:0.85rem; font-size:0.9rem; border-radius:10px; }
.auth-footer { text-align:center; padding-top:1.5rem; border-top:1px solid var(--border); margin-top:1.5rem; font-size:0.85rem; color:var(--gray-600); }
.auth-footer a { color:var(--sage-dark); font-weight:600; text-decoration:none; margin-left:6px; }
.auth-side { flex:1; position:relative; min-height:400px; }
.auth-side-img { width:100%; height:100%; object-fit:cover; }
.auth-side-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(45,45,45,0.7), rgba(45,45,45,0.15)); display:flex; flex-direction:column; justify-content:flex-end; padding:2.5rem; color:white; }
.auth-side-quote { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-style:italic; margin-bottom:8px; }
.auth-side-tagline { font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; opacity:0.75; }
@media (max-width:768px) { .auth-card { flex:1; padding:2rem; } }
</style>
{% endblock content %}
