name: Django CPP Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Stage 1: Build
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget zip

      - name: Install Java 17 (Amazon Corretto)
        run: |
          sudo apt-get purge -y openjdk*
          sudo apt-get install -y java-common
          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb
          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb
          export PATH=$JAVA_HOME/bin:$PATH
          echo "Java version: $(java --version)"
          echo "Java installation done"

      - name: Run Django checks
        run: |
          python manage.py check

      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput

      - name: Create deployment package
        run: |
          # Create deployment zip directly without copying to subdirectory
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "*__pycache__*" \
            -x "*.pyc" \
            -x "*.db.sqlite3" \
            -x "*.log" \
            -x ".env*" \
            -x "venv/*" \
            -x "env/*" \
            -x "deploy.zip" \
            -x "*.vscode/*" \
            -x "*.idea/*"
          
          # Verify zip file was created
          ls -la deploy.zip
          echo "Deployment package size: $(du -sh deploy.zip | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-package
          path: deploy.zip
          retention-days: 7

  # Stage 2: Test
  test:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django coverage

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-package
          path: ./

      - name: Extract deployment package for testing
        run: |
          unzip -q deploy.zip -d test_app
          ls -la test_app/

      - name: Run Django system checks
        run: |
          python manage.py check --deploy

      - name: Run migrations check
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        run: |
          coverage run manage.py test
          coverage report
          coverage xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.xml
            .coverage
          retention-days: 7

      - name: Upload test package for deployment
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 7

  # Stage 3: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Verify deployment package
        run: |
          ls -la deploy.zip
          unzip -t deploy.zip

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: x25167341-eb-cpp
          environment_name: x25167341-eb-cpp-env
          region: us-east-1
          version_label: "build-${{ github.run_number }}"
          deployment_package: deploy.zip
          wait_for_deployment: false

      - name: Get deployment status
        run: |
          echo "Deployment initiated for version: build-${{ github.run_number }}"
          echo "Check AWS Elastic Beanstalk console for deployment status"